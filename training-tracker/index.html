<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>STUDIO A 培訓紀錄查詢</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface-2: #f2f2ef;
    --border: #e5e5e0;
    --border-strong: #c8c8c0;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b65;
    --text-muted: #a8a8a0;
    --accent: #1a1a18;
    --accent-soft: #e8e8e4;
    --green: #2d7a4f;
    --green-bg: #edf7f1;
    --amber: #b85c00;
    --amber-bg: #fef3e7;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --blue: #1a5276;
    --blue-bg: #eaf1f8;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 16px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-left: 12px;
  }
  .header-left { display: flex; align-items: baseline; gap: 0; }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--text-primary); }
  .breadcrumb .active { color: var(--text-primary); font-weight: 500; cursor: default; }
  .breadcrumb .sep { color: var(--border-strong); }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .page-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── REGION GRID ── */
  .region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .region-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .region-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .region-card .region-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .region-card .region-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .region-card .region-arrow {
    margin-top: 8px;
    font-size: 16px;
    color: var(--text-muted);
    transition: transform 0.15s;
  }
  .region-card:hover .region-arrow { transform: translateX(4px); color: var(--text-primary); }

  /* ── STORE LIST ── */
  .store-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .store-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .store-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .store-name { font-size: 15px; font-weight: 500; }
  .store-count { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  /* ── SECTION LABEL ── */
  .section-label-row {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }


  /* ── STORE STAFF VIEW ── */
  .store-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    gap: 8px;
    flex: 1;
    max-width: 280px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box svg { color: var(--text-muted); flex-shrink: 0; }
  .search-box input {
    border: none;
    outline: none;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: transparent;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--text-muted); }

  /* ── RANK GROUP ── */
  .rank-group { margin-bottom: 24px; }
  .rank-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .rank-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .rank-count {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── STAFF CARD ── */
  .staff-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .staff-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }
  .staff-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .staff-info { flex: 1; min-width: 0; }
  .staff-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .staff-name { font-size: 14px; font-weight: 600; }
  .staff-name-en { font-size: 12px; color: var(--text-muted); }
  .staff-meta { display: flex; gap: 12px; }
  .staff-meta-item { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .staff-progress { min-width: 160px; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .progress-label span { font-size: 11px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }
  .progress-bar-bg {
    height: 6px;
    background: var(--surface-2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.6s ease;
  }
  .progress-bar-fill.complete { background: var(--green); }
  .progress-bar-fill.mid { background: var(--amber); }
  .staff-arrow { color: var(--text-muted); font-size: 14px; }

  /* ── DETAIL VIEW ── */
  .detail-header {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .detail-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .detail-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.02em; }
  .detail-name-en { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .detail-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .tag-rank { background: var(--accent); color: white; }
  .tag-store { background: var(--surface-2); color: var(--text-secondary); }
  .tag-tenure { background: var(--surface-2); color: var(--text-secondary); font-family: 'DM Mono', monospace; }
  .tag-id { background: var(--surface-2); color: var(--text-muted); font-family: 'DM Mono', monospace; }

  .detail-stats {
    margin-left: auto;
    text-align: right;
  }
  .detail-stats .big-num { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
  .detail-stats .big-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .detail-stats .joined { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface-2);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    background: transparent;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .tab-btn:hover { background: var(--surface); color: var(--text-primary); }
  .tab-btn.active { background: var(--surface); color: var(--text-primary); font-weight: 600; box-shadow: var(--shadow); }
  .tab-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: var(--accent-soft);
    color: var(--text-secondary);
    padding: 1px 5px;
    border-radius: 10px;
  }
  .tab-badge.done { background: var(--green-bg); color: var(--green); }

  /* ── TRAINING TABLE ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.15s ease; }

  .section-block {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .section-title {
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-progress { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }

  .training-row {
    display: flex;
    align-items: center;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
  }
  .training-row:last-child { border-bottom: none; }
  .training-row:hover { background: var(--surface-2); }
  .training-label {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
  }
  .training-value {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-secondary);
    min-width: 90px;
    text-align: right;
  }
  .training-value.done { color: var(--green); }
  .training-value.pending {
    color: var(--text-muted);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-done { background: var(--green); }
  .dot-pending { background: var(--border-strong); }
  .dot-exempt { background: var(--text-muted); opacity: 0.4; }
  .training-value.exempt { color: var(--text-muted); }

  /* ── EXAM ROW ── */
  .exam-block {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .exam-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .exam-title { font-size: 13px; font-weight: 600; }
  .exam-date { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-secondary); margin-left: auto; }
  .exam-scores {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 6px;
    flex-wrap: wrap;
  }
  .exam-score-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .exam-score-label {
    font-size: 12px;
    color: var(--text-muted);
  }
  .exam-score-val {
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .exam-score-val.pass { color: var(--green); }
  .exam-score-val.fail { color: var(--red); }
  .exam-score-val.na { color: var(--text-muted); font-size: 13px; font-weight: 400; }
  .exam-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
    margin: 0 6px;
  }
  .exam-pass-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 4px;
  }
  .exam-pass-chip.pass { background: var(--green-bg); color: var(--green); }
  .exam-pass-chip.fail { background: var(--red-bg); color: var(--red); }
  .exam-inline-header {
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }

  /* ── SEED BADGE ── */
  .seed-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 6px;
    background: var(--blue-bg);
    color: var(--blue);
    font-family: 'DM Mono', monospace;
  }

  /* ── BACK BTN ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 20px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.1s;
  }
  .back-btn:hover { color: var(--text-primary); }

  /* ── TYPE TAGS ── */
  .type-tag {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 7px;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .type-tag.course { background: #eff6ff; color: #2563eb; }
  .type-tag.video  { background: #f5f3ff; color: #7c3aed; }
  .type-tag.note   { background: var(--surface-2); color: var(--text-muted); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── PASS CHIP ── */
  .pass-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .chip-pass { background: var(--green-bg); color: var(--green); }
  .chip-na { background: var(--surface-2); color: var(--text-muted); }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-logo">STUDIO A</span>
    <span class="header-sub">培訓紀錄查詢系統</span>
  </div>
  <span style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;" id="today-date"></span>
</header>

<main class="main">

  <!-- ① 選區域 -->
  <div class="view active" id="view-region">
    <div class="page-title">選擇區域</div>
    <div class="page-desc">請選擇您負責的區域，查看夥伴培訓歷程紀錄。</div>
    <div class="region-grid" id="region-grid"></div>
  </div>

  <!-- ② 選門市 / 職級 -->
  <div class="view" id="view-store">
    <button class="back-btn" onclick="goTo('region')">← 返回區域選擇</button>
    <div class="breadcrumb" id="bc-store"></div>
    <div class="page-title" id="store-view-title"></div>
    <div class="page-desc" id="store-view-desc"></div>
    <div class="search-box" style="margin-bottom:24px;max-width:320px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="store-search-input" placeholder="搜尋姓名、員編…" oninput="filterRegionStaff(this.value)">
    </div>
    <div id="store-search-results" style="display:none;"></div>
    <div id="store-browse">
      <div class="section-label-row">門市</div>
      <div class="store-grid" id="store-grid"></div>
      <div class="section-label-row" style="margin-top:28px;">職級</div>
      <div id="rank-grid"></div>
    </div>
  </div>

  <!-- ③ 門市人員 -->
  <div class="view" id="view-staff">
    <button class="back-btn" onclick="goTo('store')">← 返回</button>
    <div class="breadcrumb" id="bc-staff"></div>
    <div style="margin-bottom:20px;">
      <div class="page-title" id="staff-view-title"></div>
      <div class="page-desc" id="staff-view-desc"></div>
    </div>
    <div id="staff-list"></div>
  </div>

  <!-- ④ 個人詳細 -->
  <div class="view" id="view-detail">
    <button class="back-btn" onclick="goBack()">← 返回人員清單</button>
    <div class="breadcrumb" id="bc-detail"></div>
    <div id="detail-content"></div>
  </div>

</main>

<script>
// ════════════════════════════════════════════════════
// ★ 資料區塊 — 由 Claude Code 替換此處的假資料 ★
// ════════════════════════════════════════════════════
const DATA = {
  regions: [
    {"id": "north1", "name": "北一區", "stores": ["士林", "大葉高島屋", "阿波羅", "美麗華", "微風", "羅東"], "color": "#2563eb", "colorBg": "#eff6ff", "colorBorder": "#bfdbfe"},
    {"id": "north2", "name": "北二區", "stores": ["永和", "板橋誠品", "板橋遠百", "花蓮", "新西門", "新店裕隆城", "新莊宏匯"], "color": "#0891b2", "colorBg": "#ecfeff", "colorBorder": "#a5f3fc"},

const $ = id => document.getElementById(id);

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  $(v).classList.add('active');
}

function goTo(target) {
  if (target === 'region') { state.region = null; state.store = null; state.rank = null; renderRegions(); showView('view-region'); }
  if (target === 'store')  { state.store = null; state.rank = null; renderStores(); showView('view-store'); }
  if (target === 'staff')  { state.staff = null; renderStaffList(); showView('view-staff'); }
}

function goBack() {
  if (state.store === null && state.rank === null) goTo('store');
  else goTo('staff');
}

function val(v, fallback = '－') { return v && v.trim() !== '' ? v : fallback; }
function isDone(v) { return v && v.trim() !== ''; }

// ── 進度計算 ──
function calcProgress(s, title) {
  const allFields = {
    "實習生": ["day01","day02","day03","day04","day05","videoService","videoSecurity","videoGender","m1Written","m1CustomerService","m2Written","m2Practical","m2Maintenance","seedLevel","videoLegal","videoSafety","videoDataTransfer","m3Written","m3Practical"],
    "銷售顧問": ["shinkoPolicyDate","shinkoAccount","iosSalesDay01","iosSalesDay02","macSalesDay01","macSalesDay02","iosExpertDay01","iosExpertDay02","iosExpertPass"],
    "資深銷售顧問": ["macSpecDay01","macSpecDay02","macSpecPass","csServiceCert","srWritten","srPractical"],
    "儲備幹部": ["inventoryMgmt","lossReport","swotAnalysis","reserveWritten","reservePractical"],
    "店長": ["managerWritten","managerPractical","managerCourse"],
  };
  const titleMap = {
    "實習生": "實習生", "銷售顧問": "銷售顧問", "資深銷售顧問": "資深銷售顧問", "儲備幹部": "儲備幹部", "店長": "店長",
    "校園顧問": "銷售顧問", "資深校園顧問": "資深銷售顧問", "校園店長": "店長", "代理店長": "店長",
  };
  const fields = allFields[titleMap[title]] || allFields["實習生"];
  const total = fields.length;
  const done = fields.filter(f => {
    if (f === 'seedLevel') return s[f] && parseInt(s[f]) >= 30;
    return isDone(s[f]);
  }).length;
  return { done, total, pct: Math.round((done / total) * 100) };
}

// ── 日期格式化 ──
function fmtDate(d) {
  if (!d) return null;
  const filmSuffix = ' 影片完成';
  const hasFilm = d.endsWith(filmSuffix);
  const dateStr = hasFilm ? d.slice(0, -filmSuffix.length) : d;
  const parts = dateStr.split('-');
  if (parts.length !== 3) return d;
  const formatted = `${parts[0]}/${parts[1]}/${parts[2]}`;
  return hasFilm ? `${formatted} <span style="color:var(--text-muted);font-size:11px;">影片完成</span>` : formatted;
}

function renderStaffList(filter = '') {
  const r = state.region;

  if (isRankMode) {
    $('bc-staff').innerHTML = `<span onclick="goTo('region')">${r.name}</span><span class="sep">›</span><span onclick="goTo('store')" style="color:${r.color};">職級</span><span class="sep">›</span><span class="active">${state.rank}</span>`;

    $('staff-view-title').textContent = state.store;
  }

  let staffList = isRankMode
    ? DATA.staff.filter(s => s.region === r.id && (RANK_GROUP_LABEL[s.title] || '實習生') === state.rank)
    : DATA.staff.filter(s => s.store === state.store);

  if (filter) {
    const q = filter.toLowerCase();

          </div>
        </div>
        <span class="staff-arrow">›</span>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function row(label, value, note = '', type = '') {
  const exempt = value === '-';
  const done = !exempt && isDone(value);
  const typeTag = type === 'course' ? '<span class="type-tag course">課程</span>'
                : type === 'video'  ? '<span class="type-tag video">影片</span>'
                : type === 'note'   ? '<span class="type-tag note">不列入考核</span>'
                : '';
  const dotCls = exempt ? 'dot-exempt' : done ? 'dot-done' : 'dot-pending';
  const valCls = exempt ? 'exempt' : done ? 'done' : 'pending';
  const valTxt = exempt ? '已完成' : done ? (value === '✅' ? '✅' : fmtDate(value) || value) : '－';
  return `<div class="training-row">
    <span class="status-dot ${dotCls}"></span>
    <span class="training-label">${label}${typeTag}${note ? `<span style="font-size:11px;color:var(--text-muted);margin-left:6px;">${note}</span>` : ''}</span>
    <span class="training-value ${valCls}">${valTxt}</span>
  </div>`;
}

function scoreDisplay(val) {
  if (!isDone(val)) return { html: '－', cls: 'na', num: null };
  if (val === 'v') return { html: '通過', cls: 'pass', num: 100 };
  const num = parseFloat(val);
  if (!isNaN(num)) return { html: `${val} 分`, cls: num >= 80 ? 'pass' : 'fail', num };
  return { html: val, cls: 'pass', num: null };
}

function examBlock(title, dateVal, written, practical) {
  const done = isDone(dateVal);
  const w = scoreDisplay(written);
  const p = practical !== undefined ? scoreDisplay(practical) : null;

  // 通過判斷：有術科時兩科都 ≥ 80，只有筆試時筆試 ≥ 80
  let passed = null;
  if (isDone(written)) {
    if (p !== null) {
      passed = (w.num !== null && w.num >= 80) && (p.num !== null && p.num >= 80);
    } else {
      passed = w.num !== null && w.num >= 80;
    }
  }

  const passChip = passed !== null
    ? `<span class="exam-pass-chip ${passed ? 'pass' : 'fail'}">${passed ? '✅ 通過' : '❌ 未通過'}</span>`
    : '';

  const scoresHtml = `
    <div class="exam-scores">
      <div class="exam-score-item">
        <span class="exam-score-label">筆試</span>
        <span class="exam-score-val ${w.cls}">${w.html}</span>
      </div>
      ${p !== null ? `
      <div class="exam-divider"></div>
      <div class="exam-score-item">
        <span class="exam-score-label">術科</span>
        <span class="exam-score-val ${p.cls}">${p.html}</span>
      </div>` : ''}
      ${passChip}
    </div>`;

  return `<div class="exam-block">
    <div class="exam-header">
      <span class="exam-title">${title}</span>
      ${done ? `<span class="exam-date">${fmtDate(dateVal)}</span>` : `<span class="pass-chip chip-na">尚未考核</span>`}
    </div>
    ${scoresHtml}
  </div>`;
}

function promotionBlock(sectionTitle, rows, examTitle, examDateVal, written, practical) {
  const done = isDone(examDateVal);
  const w = scoreDisplay(written);
  const p = practical !== undefined ? scoreDisplay(practical) : null;
  let passed = null;
  if (isDone(written)) {
    passed = p !== null
      ? (w.num !== null && w.num >= 80) && (p.num !== null && p.num >= 80)
      : (w.num !== null && w.num >= 80);
  }
  const passChip = passed !== null
    ? `<span class="exam-pass-chip ${passed ? 'pass' : 'fail'}">${passed ? '✅ 通過' : '❌ 未通過'}</span>`
    : '';
  const examInline = `
    <div class="exam-inline-header">
      <span class="exam-title">${examTitle}</span>
      ${done ? `<span class="exam-date">${fmtDate(examDateVal)}</span>` : `<span class="pass-chip chip-na">尚未考核</span>`}
    </div>
    <div class="exam-scores">
      <div class="exam-score-item">
        <span class="exam-score-label">筆試</span>
        <span class="exam-score-val ${w.cls}">${w.html}</span>
      </div>
      ${p !== null ? `
      <div class="exam-divider"></div>
      <div class="exam-score-item">
        <span class="exam-score-label">術科</span>
        <span class="exam-score-val ${p.cls}">${p.html}</span>
      </div>` : ''}
      ${passChip}
    </div>`;
  return `<div class="section-block">
    <div class="section-title">
      <span>${sectionTitle}</span>
    </div>
    ${rows}${examInline}
  </div>`;
}

function sectionBlock(title, rows, done, total) {
  return `<div class="section-block">
    <div class="section-title">
      <span>${title}</span>
      <span class="section-progress">${done}/${total}</span>
    </div>
    ${rows}
  </div>`;
}

function renderDetail() {
  const s = state.staff;
  const r = state.region;
  const detailMid = state.store || state.rank;
  $('bc-detail').innerHTML = detailMid
    ? `<span onclick="goTo('region')">${r.name}</span><span class="sep">›</span><span onclick="goBack()" style="color:${r.color};">${detailMid}</span><span class="sep">›</span><span onclick="goBack()">人員清單</span><span class="sep">›</span><span class="active">${s.name}</span>`
    : `<span onclick="goTo('region')">${r.name}</span><span class="sep">›</span><span onclick="goTo('store')" style="color:${r.color};">搜尋結果</span><span class="sep">›</span><span class="active">${s.name}</span>`;

  // 整體進度
  const prog = calcProgress(s, s.title);

  const RANK_COLORS = {
    "實習生":     { bg: "#fef3e7", text: "#b85c00" },
    "銷售顧問":   { bg: "#eff6ff", text: "#2563eb" },
    "資深銷售顧問":{ bg: "#f5f3ff", text: "#7c3aed" },
    "儲備幹部":   { bg: "#ecfdf5", text: "#059669" },
    "店長":       { bg: "#fdf2f8", text: "#9d174d" },
  };
  const rc = RANK_COLORS[s.title] || { bg: '#f2f2ef', text: '#6b6b65' };

  const headerHtml = `
    <div class="detail-header">
      <div class="detail-avatar" style="background:${rc.bg};color:${rc.text};">${s.name.slice(-2)}</div>
      <div>
        <div class="detail-name">${s.name}</div>
        <div class="detail-name-en">${s.nameEn}</div>
        <div class="detail-tags">
          <span class="detail-tag tag-rank" style="background:${rc.bg};color:${rc.text};">${s.title}</span>
          <span class="detail-tag tag-store" style="border-left:3px solid ${r.color};">${s.store}</span>
          <span class="detail-tag tag-id">${s.id}</span>
          <span class="detail-tag tag-tenure">年資 ${s.tenure}</span>
        </div>
      </div>
      <div class="detail-stats">
        <div class="big-num" style="color:${r.color};">${prog.pct}<span style="font-size:16px;font-weight:400">%</span></div>
        <div class="big-label">整體完成率</div>
        <div class="joined">到職 ${fmtDate(s.joinDate)}</div>
      </div>
    </div>`;

  // Tab 計算
  function tabCount(fields) {
    const total = fields.length;
    const done = fields.filter(f => isDone(s[f])).length;
    return { done, total };
  }

  const isInternOnly = INTERN_ONLY_TITLES.has(s.title);

  const allTabDefs = [
    { id: 'tab-intern', label: '實習生', fields: ["day01","day02","day03","day04","day05","videoService","videoSecurity","videoGender","m1Written","m1CustomerService","m2Written","m2Practical","m2Maintenance","seedLevel","videoLegal","videoSafety","videoDataTransfer","m3Written","m3Practical"] },
    { id: 'tab-sc', label: '銷售顧問', fields: ["shinkoPolicyDate","shinkoAccount","iosSalesDay01","iosSalesDay02","macSalesDay01","macSalesDay02","iosExpertDay01","iosExpertDay02","iosExpertPass"] },
    { id: 'tab-sr', label: '資深銷售顧問', fields: ["srWritten","srPractical","macSpecDay01","macSpecDay02","macSpecPass","csServiceCert"] },
    { id: 'tab-reserve', label: '儲備幹部', fields: ["inventoryMgmt","lossReport","swotAnalysis","reserveWritten","reservePractical"] },
    { id: 'tab-manager', label: '店長', fields: ["managerWritten","managerPractical","managerCourse"] },
  ];
  const tabDefs = isInternOnly ? [allTabDefs[0]] : allTabDefs;

  const tabsHtml = `<div class="tabs">${tabDefs.map((t, i) => {
    const c = tabCount(t.fields);
    const allDone = c.done === c.total;
    return `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab('${t.id}', this)">${t.label} <span class="tab-badge ${allDone?'done':''}">${c.done}/${c.total}</span></button>`;
  }).join('')}</div>`;

  // ── 實習生 Tab ──
  // 區塊一：到職訓練 + 前三支影片
  const sect1rows = [
    ...["day01","day02","day03","day04","day05"].map((f,i)=>row(`新人到職 Day 0${i+1}`, s[f], '', 'course')),
    row('服務禮儀影片', s.videoService, '', 'video'),
    row('資訊安全影片', s.videoSecurity, '', 'video'),
    row('職場性別平等影片', s.videoGender, '', 'video'),
  ].join('');
  const sect1fields = ["day01","day02","day03","day04","day05","videoService","videoSecurity","videoGender"];
  const sect1 = sectionBlock('到職訓練', sect1rows, sect1fields.filter(f=>isDone(s[f])).length, sect1fields.length);

  // 考核里程碑 M1
  const m1 = examBlock('新人考核 M1', s.m1Date, s.m1Written);
  // M1 後課程
  const sectM1afterRows = row('客服入門', s.m1CustomerService, '', 'course');
  const sectM1after = sectionBlock('M1 後課程', sectM1afterRows, isDone(s.m1CustomerService)?1:0, 1);

  // 考核里程碑 M2
  const m2 = examBlock('新人考核 M2', s.m2Date, s.m2Written, s.m2Practical);

  // M2 後課程
  const seedNum = parseInt(s.seedLevel);
  const seedDone = s.seedLevel && seedNum >= 30;
  const seedHtml = seedDone
    ? `<div class="training-row"><span class="status-dot dot-done"></span><span class="training-label">SEED 等級</span><span class="training-value done"><span class="seed-badge">SEED ${s.seedLevel} 級</span></span></div>`
    : s.seedLevel
      ? `<div class="training-row"><span class="status-dot dot-pending"></span><span class="training-label">SEED 等級</span><span class="training-value pending">${s.seedLevel} 級（未達 30）</span></div>`
      : `<div class="training-row"><span class="status-dot dot-pending"></span><span class="training-label">SEED 等級</span><span class="training-value pending">－</span></div>`;
  const sectM2afterRows = [
    row('維修收取件', s.m2Maintenance, '', 'course'),
    seedHtml,
    row('法治教育影片', s.videoLegal, '', 'video'),
    row('職場安全影片（緊急異常）', s.videoSafety, '', 'video'),
    row('資料移轉影片', s.videoDataTransfer, '', 'video'),
  ].join('');
  const sectM2afterFields = ["m2Maintenance","seedLevel","videoLegal","videoSafety","videoDataTransfer"];
  const sectM2after = sectionBlock('M2 後課程', sectM2afterRows, sectM2afterFields.filter(f=>isDone(s[f])).length, sectM2afterFields.length);

  const m3 = examBlock('新人考核 M3', s.m3Date, s.m3Written, s.m3Practical);

  const internContent = `<div class="tab-content active" id="tab-intern">${sect1}${m1}${sectM1after}${m2}${sectM2after}${m3}</div>`;

  // SC tab
  const scBasicRows = [
    row('新光保險登入日期', s.shinkoPolicyDate),
    row('新光保險帳號', s.shinkoAccount),
  ].join('');
  const scBasic = sectionBlock('新光保險', scBasicRows, ["shinkoPolicyDate","shinkoAccount"].filter(f=>isDone(s[f])).length, 2);

  const scCourseRows = [
    row('iOS 銷售技巧 Day 01', s.iosSalesDay01, '', 'course'),
    row('iOS 銷售技巧 Day 02', s.iosSalesDay02, '', 'course'),
    row('Mac 銷售技巧 Day 01', s.macSalesDay01, '', 'course'),
    row('Mac 銷售技巧 Day 02', s.macSalesDay02, '', 'course'),
    row('iOS Expert 衝刺 Day 01', s.iosExpertDay01, '', 'course'),
    row('iOS Expert 衝刺 Day 02', s.iosExpertDay02, '', 'course'),
  ].join('');
  const scCourseFields = ["iosSalesDay01","iosSalesDay02","macSalesDay01","macSalesDay02","iosExpertDay01","iosExpertDay02"];
  const scCourse = sectionBlock('銷售課程', scCourseRows, scCourseFields.filter(f=>isDone(s[f])).length, scCourseFields.length);

  function passRow(label, val) {
    const done = isDone(val);
    return `<div class="training-row">
      <span class="status-dot ${done ? 'dot-done' : 'dot-pending'}"></span>
      <span class="training-label">${label}</span>
      <span class="training-value ${done ? 'done' : 'pending'}" style="font-size:16px;">${done ? '✅' : '❌'}</span>
    </div>`;
  }

  const iosExpertRows = [
    row('iOS Expert 檢定 1', s.iosExpert1, '首次考試日期'),
    row('iOS Expert 檢定 2', s.iosExpert2, '第二次考試日期'),
    row('iOS Expert 檢定 3', s.iosExpert3, '第三次考試日期'),
    passRow('iOS Expert 通過', s.iosExpertPass),
  ].join('');
  const iosExpert = sectionBlock('iOS Expert 認證', iosExpertRows, isDone(s.iosExpertPass)?1:0, 1);

  const scM3Exam = examBlock('新人考核 M3', s.m3Date, s.m3Written, s.m3Practical);

  const scContent = `<div class="tab-content" id="tab-sc">${scM3Exam}${scBasic}${scCourse}${iosExpert}</div>`;

  // SR tab
  const macCourseRows = [
    row('打造門市銷售力', s.storeSellingPower, '', 'note'),
    row('Mac Specialist 衝刺 Day 01', s.macSpecDay01, '', 'course'),
    row('Mac Specialist 衝刺 Day 02', s.macSpecDay02, '', 'course'),
  ].join('');
  const macCourseFields = ["macSpecDay01","macSpecDay02"];
  const macCourse = sectionBlock('Mac 課程', macCourseRows, macCourseFields.filter(f=>isDone(s[f])).length, macCourseFields.length);

  const macSpecRows = [
    row('Mac Specialist 檢定 1', s.macSpec1, '首次考試日期'),
    row('Mac Specialist 檢定 2', s.macSpec2, '第二次考試日期'),
    row('Mac Specialist 檢定 3', s.macSpec3, '第三次考試日期'),
    passRow('Mac Specialist 通過', s.macSpecPass),
    row('客戶服務專業認證', s.csServiceCert),
  ].join('');
  const macSpecFields = ["macSpecPass","csServiceCert"];
  const macSpec = sectionBlock('Mac Specialist 認證', macSpecRows, macSpecFields.filter(f=>isDone(s[f])).length, macSpecFields.length);

  const srExam = examBlock('資深銷售顧問考核', s.srExamDate, s.srWritten, s.srPractical);

  const srContent = `<div class="tab-content" id="tab-sr">${srExam}${macCourse}${macSpec}</div>`;

  // Reserve tab
  const reserveRows = [
    row('庫存管理', s.inventoryMgmt, '', 'course'),
    row('簡損表', s.lossReport, '', 'course'),
    row('SWOT 分析', s.swotAnalysis, '', 'course'),
  ].join('');
  const reserveFields = ["inventoryMgmt","lossReport","swotAnalysis"];
  const reserveCourse = sectionBlock('店務課程', reserveRows, reserveFields.filter(f=>isDone(s[f])).length, reserveFields.length);

  const reserveExam = examBlock('儲備幹部考核', s.reserveDate, s.reserveWritten, s.reservePractical);

  const reserveContent = `<div class="tab-content" id="tab-reserve">${reserveExam}${reserveCourse}</div>`;

  // Manager tab
  const managerRows = row('店長課程', s.managerCourse, '', 'course');
  const managerCourseBlock = sectionBlock('店長課程', managerRows, isDone(s.managerCourse)?1:0, 1);

  const managerExam = examBlock('店長考核', s.managerDate, s.managerWritten, s.managerPractical);

  const managerContent = `<div class="tab-content" id="tab-manager">${managerExam}${managerCourseBlock}</div>`;

  $('detail-content').innerHTML = headerHtml + tabsHtml + internContent + scContent + srContent + reserveContent + managerContent;
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// ── 日期顯示 ──
const today = new Date();
$('today-date').textContent = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

// ── 初始化 ──
renderRegions();
</script>
